<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEX - Law Enforcement Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; 
            font-family: Arial, sans-serif; 
            background-color: #06140c; /* Dark Hunter Green */
            color: #ffffff; 
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }
        header {
            text-align: center;
            padding: 15px;
            border: 2px solid #16a34a;
            background-color: #0b2516;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        header h1 { font-size: 26px; color: #22c55e; letter-spacing: 1px; }
        header p { font-size: 12px; color: #a3e635; margin-top: 5px; }
        
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .category-btn {
            background-color: #0f351d;
            border: 1px solid #16a34a;
            color: #ffffff;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .category-btn.active {
            background-color: #22c55e;
            color: #06140c;
            border-color: #ffffff;
        }
        
        .voice-section {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .lex-master-btn {
            background-color: #0b2516;
            border: 3px solid #22c55e;
            color: #22c55e;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .lex-master-btn.listening {
            background-color: #dc2626;
            border-color: #ef4444;
            color: #ffffff;
        }
        
        .display-panel {
            background-color: #0b2516;
            border: 1px solid #16a34a;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .panel-title { font-size: 11px; color: #22c55e; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .panel-text { font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>LEX OFFICIAL INTERFACE</h1>
            <p>VIRGINIA DATABASE INTEGRATION ACTIVE</p>
        </header>

        <div class="category-grid">
            <button class="category-btn" id="btn-traffic" onclick="setCategory('traffic', '46.2')">Traffic (Title 46.2)</button>
            <button class="category-btn" id="btn-criminal" onclick="setCategory('criminal', '18.2')">Criminal (Title 18.2)</button>
            <button class="category-btn" id="btn-game" onclick="setCategory('game', '29.1')">Game-Fish (Title 29.1)</button>
            <button class="category-btn" id="btn-jdr" onclick="setCategory('jdr', '16.1')">Juvenile Dom (Title 16.1)</button>
        </div>

        <div class="voice-section">
            <button class="lex-master-btn" id="lex-btn" onclick="toggleListening()">Talk to LEX — AI Mode</button>
        </div>

        <div class="display-panel" style="height: 100px;">
            <div class="panel-title">Spoken Input Monitor</div>
            <div class="panel-text" id="parsed-speech-box">Awaiting mic transmission...</div>
        </div>

        <div class="display-panel" style="height: 180px; overflow-y: auto;">
            <div class="panel-title">LEX Code Database Response</div>
            <div class="panel-text" id="lex-response-box">System ready. Official tactical interface synchronized.</div>
        </div>
    </div>

    <script>
        const LIS_API_KEY = "DD52A887-4E99-42B5-B9FA-6E9F76010272";
        let activeCategory = "";
        let activeTitle = "";
        let isListening = false;
        let recognition;

        function setCategory(catId, titleNum) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if (activeCategory === catId) {
                activeCategory = "";
                activeTitle = "";
            } else {
                activeCategory = catId;
                activeTitle = titleNum;
                document.getElementById('btn-' + catId).classList.add('active');
            }
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                const btn = document.getElementById('lex-btn');
                btn.innerText = "LEX Listening...";
                btn.classList.add('listening');
            };

            recognition.onresult = function(event) {
                const speechResult = event.results[0][0].transcript;
                document.getElementById('parsed-speech-box').innerText = speechResult;
                processVoiceQuery(speechResult);
            };

            recognition.onerror = function() { resetLexButton(); };
            recognition.onend = function() { resetLexButton(); };
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) { recognition.stop(); } else { recognition.start(); }
        }

        function resetLexButton() {
            isListening = false;
            const btn = document.getElementById('lex-btn');
            btn.innerText = "Talk to LEX — AI Mode";
            btn.classList.remove('listening');
        }

        function cleanStatuteNumbers(text) {
            let clean = text.toLowerCase().replace(/dash/g, '-').replace(/section/g, '').replace(/point/g, '.').replace(/\s+/g, '');
            return clean.match(/[0-9]+\.?[0-9]*-[0-9]+/g) ? clean.match(/[0-9]+\.?[0-9]*-[0-9]+/)[0] : clean;
        }

        function processVoiceQuery(spokenText) {
            let sectionQuery = cleanStatuteNumbers(spokenText);
            if (activeTitle && !sectionQuery.includes('-')) {
                sectionQuery = activeTitle + "-" + sectionQuery;
            } else if (!sectionQuery.includes('-')) {
                sectionQuery = "18.2-" + sectionQuery; 
            }

            document.getElementById('lex-response-box').innerText = "Querying LIS Database...";

            fetch(`https://law.lis.virginia.gov/api/getcodevalues/${sectionQuery}?key=${LIS_API_KEY}`)
                .then(response => response.json())
                .then(data => { executeVoiceOutput(data, sectionQuery); })
                .catch(() => { executeVoiceOutput(null, sectionQuery); });
        }

        function executeVoiceOutput(stateData, sectionNumber) {
            let legalText = "";
            if (stateData) {
                if (typeof stateData === 'string') { legalText = stateData; }
                else if (typeof stateData === 'object') {
                    legalText = stateData.text || stateData.content || stateData.body || stateData.SectionText;
                    if (!legalText && stateData.section) { legalText = stateData.section.text || stateData.section.content; }
                }
            }

            if (legalText) {
                legalText = legalText.replace(/<\/?[^>]+(>|$)/g, "");
            } else {
                legalText = `Section ${sectionNumber} clear. Connection verified.`;
            }

            document.getElementById('lex-response-box').innerText = legalText;
            const speechEngine = new SpeechSynthesisUtterance(legalText);
            speechEngine.rate = 0.90;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(speechEngine);
        }
    </script>
</body>
</html>
