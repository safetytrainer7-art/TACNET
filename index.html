<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LEX | TACTICAL HUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud-viewport">
        <!-- NASA Earth Background -->
        <div id="earth-container">
            <img src="https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73751/world.topo.bathy.200407.3x5400x2700.jpg" id="earth-map">
        </div>
        
        <!-- Satellite Asset -->
        <div id="satellite-orbit">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233630.png" id="sat-icon">
        </div>

        <div id="status-overlay">
            <div id="data-output">SYSTEM READY: WAITING FOR VOICE INPUT</div>
            <button id="btn-911" onclick="trigger911()">911</button>
        </div>
    </div>
    <script src="js/tactical-core.js"></script>
</body>
</html>
